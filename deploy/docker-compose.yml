services:
  app:
    image: ghcr.io/baditaflorin/audit-in-a-box:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_ADDR: :8080
      WORK_DIR: /tmp/audit-work
      ALLOWED_ORIGINS: https://baditaflorin.github.io,http://localhost:5173,http://localhost:4173
    read_only: true
    tmpfs:
      - /tmp:size=2g,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: [ "CMD", "/busybox", "wget", "-qO-", "http://127.0.0.1:8080/healthz" ]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3G
    networks:
      - audit

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "25342:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - audit

  prometheus:
    image: prom/prometheus:v3.0.1
    profiles: ["metrics"]
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - audit

networks:
  audit:
    driver: bridge
