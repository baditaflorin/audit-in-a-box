<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>audit-in-a-box</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f5ee;
        color: #17211b;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(840px, calc(100vw - 32px));
        padding: 40px 0;
      }

      h1 {
        font-size: clamp(2.25rem, 7vw, 5rem);
        line-height: 0.95;
        margin: 0 0 20px;
      }

      p {
        font-size: 1.125rem;
        line-height: 1.6;
        max-width: 660px;
      }

      a {
        color: #0f675f;
        font-weight: 700;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      .links a {
        border: 1px solid #17211b;
        border-radius: 8px;
        padding: 10px 14px;
        text-decoration: none;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>audit-in-a-box</h1>
      <p>
        GitHub Pages is live. The full dependency-audit UI and Docker analyzer are being built in this repository.
      </p>
      <div class="links">
        <a href="https://github.com/baditaflorin/audit-in-a-box">Star the repository</a>
        <a href="https://github.com/baditaflorin/">GitHub profile</a>
        <a href="https://www.paypal.com/paypalme/florinbadita">Support with PayPal</a>
      </div>
    </main>
  </body>
</html>
